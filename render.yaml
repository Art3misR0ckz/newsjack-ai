services:
  - type: web
    name: newsjack-ai
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app/streamlit_app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --browser.gatherUsageStats false
    envVars:
      - key: PYTHONPATH
        value: .
      - key: MONGODB_DATABASE
        value: newsjack_ai
      - key: ENABLE_LLM_RELEVANCE
        value: false
